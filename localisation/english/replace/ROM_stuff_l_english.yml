 ROM_iron_guard:0 "Iron Guard"
 ROM_iron_guard_desc:0 "The Legion of the Archangel Michael, otherwise known as the Iron Guard, was a Romanian far-right religious paramilitary and political organization that was active from 1927 to 1941, when it was destroyed by Marshal Ion Antonescu after a failed coup. Founded in 1927 by Corneliu Zelea Codreanu, the Legion would be primarily a political movement until 1930, when Codreanu formed the Iron Guard, a paramilitary branch of the Legion, whose name would eventually come to refer to the Legion itself."
 ROM_iron_guard_2:0 "Iron Guard"
 ROM_iron_guard_2_desc:0 "The Iron Guard would be responsible for the majority of the assassinations carried out against Carol II's former government, with hundreds of attempts made and several prominent political figures killed, among those being historian and former prime minister Nicolae Iorga, and economic theorist and journalist Virgil Madgearu."
 ROM_iron_guard_3:0 "Iron Guard"
