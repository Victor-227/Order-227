 SOV_tractor_plants:0 "Tractor Plants"
 SOV_tractor_plants_desc:0 "By designing our new tractor factories to simultaneously handle civilian agriculture and heavy armored vehicles, we can secretly lay the foundation for our wartime tank industry."
 dual_factories_explanation_tt:0 "The tractor factory decisions track how many civilian factories you have built in the state after clicking them, these civilian factories can be instantly converted to military factories once you are at war."
 SOV_gosplan_initiative:0 "Found the Gosplan Initiative"
 SOV_gosplan_initiative_desc:0 "Gosplan must determine the geographical center of our next Five-Year Plan. We must choose between the immediate high yields of the vulnerable West, or the absolute security of the underdeveloped East."
