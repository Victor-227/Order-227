l_english:
 SOV_war_economy_new:0 "Soviet War Economy"
 SOV_the_collectivization_process_ns_tt:1 "$SOV_modify_the_politburo_ns_intro$ \n$MODIFIER_CONSUMER_GOODS_EXPECTED_VALUE$: §Y-2.0%§! \n$MODIFIER_GLOBAL_BUILDING_SLOTS_FACTOR$: §G+10%§! \n$MODIFIER_PRODUCTION_SPEED_BUILDINGS_FACTOR$: §G+5.00%§! \n\n"
 SOV_dual_factories_dec_cat:0 "Integrate Military Tooling to Tractor Factories"
 SOV_dual_factories_dec_cat_desc:0 "                            The rapid industrialization of the Soviet Union                                   must serve a dual purpose. While our collective                                  farms require thousands of tractors to meet their                             quotas, the growing fascist threat demands we                                  prepare for a different kind of harvest.\n\n                            By secretly reinforcing the concrete floors,                                          expanding the foundry doors, and installing                                          heavy-duty drop forges under the guise of                                            agricultural expansion, we ensure these massive                                facilities can be retooled for heavy armor                                             production at a moment's notice. It is a severe                                    drain on our civilian construction today, but it will                             forge the sword of the Motherland tomorrow."
 SOV_leningrad:0 "Classified Expansion of the Kirov Plant"
