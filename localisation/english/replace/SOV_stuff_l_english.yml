 SOV_conversion_divider_desc:0 "These directives will only become available once the Motherland is at war and the tooling has been prepared."
 SOV_gosplan_dec_cat:0 "Directives of the Gosplan Commission"
 SOV_gosplan_dec_cat_desc:0 "The rapid industrialization of the Soviet Union requires strict, centralized planning to prepare for the inevitable coming conflict. To maximize our economic output, the State Planning Commission (Gosplan) has drafted emergency directives designed to consolidate our development into a single, specialized industrial zone.\n\nThe proposed plans focus on either the heavy industry of §YUkraine§!, the administrative and aviation core of §YMoscow§!, the arms industry of the §YUrals§!, or the deep eastern expanse of §YSiberia§!. We cannot afford to distribute our resources evenly across the vastness of the nation; we must commit our full administrative weight to just §Rone of these regions§!."
