 GER_wirtschaftsminister_mechanic_tt:0 "§YWirtschaftsminister Mechanic:§!\nWith the Führerprinzip, you will appoint a Wirtschaftsminister to guide the economy.\n\n• Picking §HSchacht, Todt, or Göring§! will lead to Speer replacing them in 1942.\n• Picking §HAlbert Speer§! will lead to him being replaced by your choice of the other three advisors in 1942.\n\nAll advisors have both an early and a 1942 version."
 GER_increasing_cg_tt: "§Y$MODIFIER_CONSUMER_GOODS_EXPECTED_VALUE$§! will §Rincrease§! by §Y[?GER.GER_monthly_consumer_goods_increase|%1]§! each month up to §Y100.0%§!. The monthly increase will be §Rhigher§! based on the amount of §Ynon-core states§! controlled by §Y[ROOT.GetName]§!."
 GER_CG_penalties_may_apply: "If §Y$MODIFIER_CONSUMER_GOODS_EXPECTED_VALUE$§! reaches §Y100.0%§! additional §Rpenalties§! will be applied."
