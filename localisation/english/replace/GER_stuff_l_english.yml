 germany.227.t:0 "Rüstungskrise 1942"
 germany.227.desc:0 "The strains of total war have exposed critical inefficiencies in our war production. The Führer has lost patience, a new hand must take the reins of the Reich's armaments industry. Albert Speer, architect and confidant of the Führer, has been appointed Reichsminister of Armaments and War Production. His reforms will determine whether the Reich can sustain the demands of a war on all fronts."
 germany_economic_crisis.1.a:0 "Speer Shall Have Full Authority"
 germany.228.t:0 "The Exhausted Minister"
 germany.228.desc:0 "The burdens of managing the Reich's war economy have taken their toll. Speer, having driven himself and the ministry to its limits, can no longer sustain the pace demanded by total war. The Führer demands fresh leadership, a new Wirtschaftsminister must be appointed to carry the weight of the Reich's industrial ambitions."
 germany_economic_crisis.2.a:0 "A New Hand Must Guide Our Industry"
 ger_42_crisis_tt:0 "This focus will auto complete on the 8th of February 1942."
