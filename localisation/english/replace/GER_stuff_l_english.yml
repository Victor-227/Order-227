 GER_oberkommando_der_wehrmacht_dec_cat:0 "Oberkommando der Wehrmahct"
 GER_oberkommando_der_wehrmacht_dec_cat_desc:0 "The Oberkommando der Wehrmacht serves as the supreme command of the German armed forces. From here, the Führer and his generals coordinate the operational planning of the Wehrmacht's campaigns, issuing directives to the Heer, Kriegsmarine and Luftwaffe. It is here that the fate of nations is decided."
