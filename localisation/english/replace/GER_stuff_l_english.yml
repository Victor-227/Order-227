 GER_oberkommando_der_wehrmacht_dec_cat:0 "Oberkommando Der Wehrmahct"
 GER_oberkommando_der_wehrmacht_dec_cat_desc:0 "The Oberkommando der Wehrmacht serves as the supreme command of the German armed forces. From here, the Führer and his generals coordinate the operational planning of the Wehrmacht's campaigns, issuing directives to the Heer, Kriegsmarine and Luftwaffe. It is here that the fate of nations is decided."
 consumer_goods_expected_value_tt: " $MODIFIER_CONSUMER_GOODS_EXPECTED_VALUE$: $RIGHT|Y%1$"
 GER_wirtschaftsminister_mechanic_tt:0 "§YWirtschaftsminister Mechanic:§!\nWith the Führerprinzip, you will appoint a Wirtschaftsminister to guide the economy.\n\n• Picking §HSchacht, Todt, or Göring§! will lead to Speer replacing them in 1942.\n• Picking §HAlbert Speer§! will lead to him being replaced by your choice of the other three advisors in 1942.\n\nAll advisors have both an early and a 1942 version."
 GER_increasing_cg_tt: "§Y$MODIFIER_CONSUMER_GOODS_EXPECTED_VALUE$§! will §Rincrease§! by §Y[?GER.GER_monthly_consumer_goods_increase|%1]§! each month up to §Y100.0%§!. The monthly increase will be §Rhigher§! based on the amount of §Ynon-core states§! controlled by §Y[ROOT.GetName]§!."
 GER_CG_penalties_may_apply: "If §Y$MODIFIER_CONSUMER_GOODS_EXPECTED_VALUE$§! reaches §Y100.0%§! additional §Rpenalties§! will be applied."
 GER_reduce_increasing_consumer_goods_tt: "§GReduce§! the increasing §Y$MODIFIER_CONSUMER_GOODS_EXPECTED_VALUE$§! each month by §Y[?GER_change_monthly_CG_price_controls|%1]§!"
 GER_unlock_price_controls_decision_tt: "Unlocks Decision: §Y$GER_price_controls_cat$§!, which can reduce §Y$MODIFIER_CONSUMER_GOODS_EXPECTED_VALUE$§!"
 GER_four_year_plan_mefo_tt:0 "§YMEFO Bills:§!\nYour expected consumer goods will steadily increase, but the rate can be altered:\n\n• §RBase Increase:§! +0.5% per month\n• §GPrice Controls:§! Reduces increase by 0.2% per month\n• §GFrench Assets:§! Reduces increase by 0.2% per month\n• §REconomy of Conquest:§! Increases by 0.1% per month per occupation tier (Max 5 tiers)\n\n§YGrowth after France capitulates and maximum tier of occupation is active:§! +0.6% per month."
 GER_industrial_consumer_goods_factor_limit_decision_tt: "§Y[GetIndustrialModifier]§! have §Rmore§! than $MODIFIER_CONSUMER_GOODS_EXPECTED_VALUE$: §Y15%§!"
